name: Update profile animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-animation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install matplotlib numpy pillow

      - name: Generate base animation
        run: python update_readme.py

      - name: Set up FFmpeg
        uses: AnimMouse/setup-ffmpeg@v1

      - name: Generate complete animation
        run: |
          ffmpeg -y \
            -i animation.gif \
            -filter_complex \
            "[0]trim=start_frame=1:end_frame=399,setpts=PTS-STARTPTS,reverse[r];[0][r]concat=n=2:v=1:a=0,split[s0][s1];[s0]palettegen[p];[s1][p]paletteuse" \
            animationfull.gif

      - name: Preserve generated animation
        run: |
          cp animationfull.gif /tmp/animationfull.gif

      - name: Publish assets branch
        run: |
          cp animationfull.gif "$RUNNER_TEMP/animationfull.gif"

          git reset --hard HEAD
          git clean -fd

          git switch --orphan generated-assets

          cp "$RUNNER_TEMP/animationfull.gif" animationfull.gif

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add animationfull.gif
          git commit -m "Update profile animation"

          git push --force origin HEAD:assets
